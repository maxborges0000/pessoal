}

// ── ENTER KEY SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  // Não dispara em textarea (só com Ctrl+Enter)
  if (e.target.tagName === 'TEXTAREA' && !e.ctrlKey) return;
  if (e.target.tagName === 'TEXTAREA' && e.ctrlKey) {
    // Ctrl+Enter em textarea de nota salva
    if (e.target.id === 'n-corpo') { e.preventDefault(); addNota(); return; }
    if (e.target.id === 'ek-desc' || e.target.id === 'en-corpo') { e.preventDefault(); return; }
  }
  // Detecta qual aba está ativa
  if (document.getElementById('content-contas').classList.contains('active')) {
    const focused = document.activeElement?.id;
    if (['c-nome','c-valor','c-venc'].includes(focused)) { e.preventDefault(); addConta(); }
  }
  if (document.getElementById('content-compromissos').classList.contains('active')) {
    const focused = document.activeElement?.id;
    if (['k-titulo','k-data'].includes(focused)) { e.preventDefault(); addCompromisso(); }
  }
  if (document.getElementById('content-notas').classList.contains('active')) {
    const focused = document.activeElement?.id;
    if (focused === 'n-titulo') { e.preventDefault(); document.getElementById('n-corpo').focus(); }
  }
  // Enter em modais
  if (!document.getElementById('modal-conta').classList.contains('hidden')) {
    if (e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveEditConta(); }
  }
  if (!document.getElementById('modal-comp').classList.contains('hidden')) {
    if (e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveEditComp(); }
  }
  if (!document.getElementById('modal-nota').classList.contains('hidden')) {
    if (e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveEditNota(); }
  }
  // Esc fecha modais
  if (e.key === 'Escape') {
    ['modal-conta','modal-comp','modal-nota'].forEach(id => {
      if (!document.getElementById(id).classList.contains('hidden')) closeModal(id);
    });
    if (!document.getElementById('confirm-modal').classList.contains('hidden')) confirmReject();
  }
});

// ── IMPORT CSV ──
let importTipo = '';
function triggerImport(tipo) {
  importTipo = tipo;
  document.getElementById('import-file-input').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result.replace(/^\uFEFF/, ''); // remove BOM
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) { showToast('Arquivo vazio ou inválido'); return; }
    const rows = lines.slice(1); // pula header
    let count = 0;
    if (importTipo === 'contas') {
      rows.forEach(row => {
        const cols = parseCSVRow(row);
        if (!cols[0]) return;
        const nome = cols[0].replace(/^"|"$/g,'');
        const valor = parseFloat(cols[1]?.replace(',','.'));
        const venc = cols[2] ? isoFromBR(cols[2]) : '';
        const pago = cols[3] === 'Sim';
        const recur = cols[4] || '';
        if (nome) { contas.push({ id: Date.now()+count, nome, valor: isNaN(valor)?null:valor, venc, pago, recur }); count++; }
      });
      save(); renderContas();
    } else if (importTipo === 'compromissos') {
      rows.forEach(row => {
        const cols = parseCSVRow(row);
        const titulo = (cols[0]||'').replace(/^"|"$/g,'');
        const data = cols[1] ? isoFromBRDT(cols[1]) : '';
        const desc = (cols[2]||'').replace(/^"|"$/g,'');
        const feito = cols[3] === 'Sim';
        if (titulo) { compromissos.push({ id: Date.now()+count, titulo, data, desc, feito }); count++; }
      });
      sortCompromissos(); save(); renderCompromissos();
    }
    showToast(`${count} itens importados ✓`);
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function parseCSVRow(row) {
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < row.length; i++) {
    if (row[i] === '"') { inQ = !inQ; }
    else if (row[i] === ';' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += row[i]; }
  }
  cols.push(cur); return cols;
}
function isoFromBR(s) {
  const m = s.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
}
function isoFromBRDT(s) {
  const m = s.match(/(\d{2})\/(\d{2})\/(\d{4})[, ]+(\d{2}):(\d{2})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}T${m[4]}:${m[5]}` : '';
}

// ── NOTA: PIN & COPY ──
function pinNota(id) {
  const n = notas.find(x => x.id === id);
  if (!n) return;
  n.pinned = !n.pinned;
  // move pinadas pro topo
  notas.sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0));
  save(); renderNotas();
}

function copyNota(id) {
  const n = notas.find(x => x.id === id);
  if (!n) return;
  const text = [n.titulo, n.corpo].filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copiado! ✓')).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copiado! ✓');
  });
}

function renderHoje() {
  const el = document.getElementById('hoje-dashboard');
  const hoje = new Date();
  const hojeDia = hoje.toDateString();
  const hojeISO = hoje.toISOString().split('T')[0];
  const diasSemana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const mesesNome = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dataFmt = `${diasSemana[hoje.getDay()]}, ${hoje.getDate()} de ${mesesNome[hoje.getMonth()]}`;

  // ── DADOS ──
  const compHoje = compromissos.filter(c => !c.feito && c.data && new Date(c.data).toDateString() === hojeDia)
    .sort((a,b) => new Date(a.data)-new Date(b.data));
  const contasUrg = contas.filter(c => !c.pago && c.venc && c.venc <= hojeISO)
    .sort((a,b) => a.venc.localeCompare(b.venc));
  const notasFix = notas.filter(n => n.pinned).slice(0,3);

  const pendentes = contas.filter(c => !c.pago);
  const pagas = contas.filter(c => c.pago);
  const totPend = pendentes.filter(c=>c.valor).reduce((s,c)=>s+c.valor,0);
  const totPago = pagas.filter(c=>c.valor).reduce((s,c)=>s+c.valor,0);
  const totGeral = totPend + totPago;
  const pctPago = totGeral > 0 ? Math.round((totPago/totGeral)*100) : 0;

  // maior gasto do mês corrente
  const mesAtual = hojeISO.substring(0,7);
  const contasMes = contas.filter(c => c.valor && c.venc && c.venc.startsWith(mesAtual));
  const maiorConta = contasMes.sort((a,b)=>(b.valor||0)-(a.valor||0))[0];

  // saúde: % pago, sem vencidas = 100, mais vencidas = pior
  const vencidas = contas.filter(c=>!c.pago && isVencido(c.venc)).length;
  let saude = contas.length === 0 ? 100 : Math.max(0, pctPago - vencidas * 15);
  const saudeColor = saude >= 70 ? 'var(--success)' : saude >= 40 ? 'var(--warn)' : 'var(--danger)';
  const saudeLabel = saude >= 70 ? '😊 Boa' : saude >= 40 ? '😐 Regular' : '😟 Atenção';

  let html = '';

  // ── HEADER ──
  html += `<div class="hoje-card">
    <div class="hoje-header">
      <div class="hoje-titulo">Seu dia</div>
      <div class="hoje-data">${dataFmt}</div>
    </div>`;

  // ── KPI GRID ──
  html += `<div class="dash-kpi-grid">
    <div class="dash-kpi">
      <div class="dash-kpi-label">💸 A pagar</div>
      <div class="dash-kpi-val ${totPend>0?'danger':''}">${pendentes.filter(c=>c.valor).length>0?fmtBRL(totPend):pendentes.length+' conta(s)'}</div>
      <div class="dash-kpi-sub">${pendentes.length} pendente${pendentes.length!==1?'s':''}</div>
    </div>
    <div class="dash-kpi">
      <div class="dash-kpi-label">✅ Pago</div>
      <div class="dash-kpi-val success">${pagas.filter(c=>c.valor).length>0?fmtBRL(totPago):pagas.length+' conta(s)'}</div>
      <div class="dash-kpi-sub">${pagas.length} quitada${pagas.length!==1?'s':''}</div>
    </div>
    <div class="dash-kpi">
      <div class="dash-kpi-label">🔥 Maior do mês</div>
      <div class="dash-kpi-val ${maiorConta?'warn':''}">${maiorConta?fmtBRL(maiorConta.valor):'—'}</div>
      <div class="dash-kpi-sub">${maiorConta?esc(maiorConta.nome.substring(0,18)):'Sem contas'}</div>
    </div>
    <div class="dash-kpi">
      <div class="dash-kpi-label">📅 Vencidas</div>
      <div class="dash-kpi-val ${vencidas>0?'danger':''}">${vencidas}</div>
      <div class="dash-kpi-sub">${compromissos.filter(c=>!c.feito).length} compromisso${compromissos.filter(c=>!c.feito).length!==1?'s':''} pend.</div>
    </div>
  </div>`;

  // ── SAÚDE FINANCEIRA ──
  html += `<div class="dash-saude">
    <div class="dash-saude-header">
      <div class="dash-saude-label">💡 Saúde financeira</div>
      <div class="dash-saude-score" style="color:${saudeColor}">${saudeLabel}</div>
    </div>
    <div class="dash-saude-bar-wrap">
      <div class="dash-saude-bar" style="width:${saude}%;background:${saudeColor}"></div>
    </div>
    <div class="dash-saude-hint">${
      vencidas > 0 ? `${vencidas} conta${vencidas!==1?'s':''} vencida${vencidas!==1?'s':''} — regularize para melhorar o score` :
      pctPago >= 70 ? 'Ótimo! Mais da metade das contas já está paga.' :
      contas.length === 0 ? 'Nenhuma conta cadastrada ainda.' :
      `${pctPago}% das contas pagas neste ciclo.`
    }</div>
  </div>`;

  // ── GRÁFICO ──
  const contasComValorCat = contas.filter(c=>c.valor && c.cat);
  const contasComValorMes = contas.filter(c=>c.valor && c.venc);
  const temDados = contasComValorCat.length > 0 || contasComValorMes.length > 0;

  html += `<div class="dash-chart-card">
    <div class="dash-chart-title">
      <span>📊 Análise</span>
      <div class="dash-chart-tabs">
        <button class="dash-chart-tab ${dashChartView==='categorias'?'active':''}" onclick="setDashChart('categorias')">Categorias</button>
        <button class="dash-chart-tab ${dashChartView==='meses'?'active':''}" onclick="setDashChart('meses')">Meses</button>
      </div>
    </div>`;

  if (!temDados) {
    html += `<div class="dash-empty-hint">Adicione contas com valor e categoria<br>para ver análises aqui.</div>`;
  } else if (dashChartView === 'categorias') {
    // barras por categoria
    const porCat = {};
    contas.filter(c=>c.valor && c.cat).forEach(c => {
      if (!porCat[c.cat]) porCat[c.cat] = 0;
      porCat[c.cat] += c.valor;
    });
    const sortedCats = Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
    const maxCat = sortedCats[0]?.[1] || 1;
    if (sortedCats.length === 0) {
      html += `<div class="dash-empty-hint">Nenhuma conta com categoria e valor cadastrada.</div>`;
    } else {
      sortedCats.forEach(([cat, val]) => {
        const info = CAT_CONTA[cat];
        if (!info) return;
        const pct = Math.round((val/maxCat)*100);
        const emoji = info.label.split(' ')[0];
        const nome = info.label.split(' ').slice(1).join(' ');
        html += `<div class="cat-bar-row">
          <span class="cat-bar-icon">${emoji}</span>
          <span class="cat-bar-name">${nome}</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%;background:${catContaColor(cat)}"></div></div>
          <span class="cat-bar-val">${fmtBRL(val)}</span>
        </div>`;
      });
    }
  } else {
    // barras por mês (últimos 6)
    const porMes = {};
    contas.filter(c=>c.valor && c.venc).forEach(c => {
      const key = c.venc.substring(0,7);
      if (!porMes[key]) porMes[key] = { total:0, pago:0 };
      porMes[key].total += c.valor;
      if (c.pago) porMes[key].pago += c.valor;
    });
    const keys = Object.keys(porMes).sort().slice(-6);
    const maxMes = Math.max(...keys.map(k=>porMes[k].total), 1);
    const mAbrev = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    if (keys.length === 0) {
      html += `<div class="dash-empty-hint">Nenhuma conta com valor e vencimento cadastrada.</div>`;
    } else {
      html += `<div class="month-bar-row">`;
      keys.forEach(k => {
        const [,m] = k.split('-');
        const d = porMes[k];
        const hTotal = Math.max(Math.round((d.total/maxMes)*70), 2);
        const hPago = d.total > 0 ? Math.round((d.pago/d.total)*hTotal) : 0;
        const hPend = hTotal - hPago;
        html += `<div class="month-bar-col">
          <div style="display:flex;flex-direction:column;align-items:center;gap:0;height:70px;justify-content:flex-end;width:100%">
            <div class="month-bar-inner" style="height:${hPend}px;background:var(--danger);opacity:0.7"></div>
            <div class="month-bar-inner" style="height:${hPago}px;background:var(--success)"></div>
          </div>
          <span class="month-bar-label">${mAbrev[parseInt(m)-1]}</span>
          <span class="month-bar-val">${fmtBRL(d.total).replace('R$\u00a0','R$')}</span>
        </div>`;
      });
      html += `</div>`;
      html += `<div style="display:flex;gap:12px;margin-top:4px">
        <span style="font-size:0.65rem;color:var(--text-3);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--success);display:inline-block"></span>Pago</span>
        <span style="font-size:0.65rem;color:var(--text-3);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--danger);opacity:0.7;display:inline-block"></span>Pendente</span>
      </div>`;
    }
  }
  html += `</div>`;

  // ── URGÊNCIAS ──
  html += `<div class="hoje-card" style="margin-bottom:12px">`;
  html += `<div class="hoje-section"><div class="hoje-section-label">📅 Compromissos hoje</div>`;
  if (compHoje.length === 0) {
    html += `<div class="hoje-empty">Nenhum compromisso para hoje ✓</div>`;
  } else {
    compHoje.slice(0,4).forEach(c => {
      const hora = new Date(c.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      html += `<div class="hoje-item" onclick="switchTab('compromissos')">
        <div class="hoje-item-dot" style="background:var(--accent)"></div>
        <div style="flex:1"><div class="hoje-item-text">${esc(c.titulo)}</div><div class="hoje-item-sub">${hora}</div></div>
      </div>`;
    });
    if (compHoje.length > 4) html += `<button class="hoje-ver-mais" onclick="switchTab('compromissos')">Ver mais ${compHoje.length-4}...</button>`;
  }
  html += `</div>`;

  html += `<div class="hoje-section"><div class="hoje-section-label">💳 Contas urgentes</div>`;
  if (contasUrg.length === 0) {
    html += `<div class="hoje-empty">Nenhuma conta vencendo ✓</div>`;
  } else {
    contasUrg.slice(0,3).forEach(c => {
      const atrasada = c.venc < hojeISO;
      const catInfo = c.cat ? CAT_CONTA[c.cat] : null;
      html += `<div class="hoje-item" onclick="switchTab('contas')">
        <div class="hoje-item-dot" style="background:${atrasada?'var(--danger)':'var(--warn)'}"></div>
        <div style="flex:1">
          <div class="hoje-item-text">${esc(c.nome)}${catInfo?` <span style="font-size:0.65rem;opacity:0.6">${catInfo.label.split(' ')[0]}</span>`:''}</div>
          <div class="hoje-item-sub">${atrasada?'Atrasada':'Vence hoje'}${c.valor?' · '+fmtBRL(c.valor):''}</div>
        </div>
      </div>`;
    });
    if (contasUrg.length > 3) html += `<button class="hoje-ver-mais" onclick="switchTab('contas')">Ver mais ${contasUrg.length-3}...</button>`;
  }
  html += `</div>`;

  if (notasFix.length > 0) {
    html += `<div class="hoje-section"><div class="hoje-section-label">📌 Notas fixadas</div>`;
    notasFix.forEach(n => {
      html += `<div class="hoje-item" onclick="editNota(${n.id})">
        <div class="hoje-item-dot" style="background:${catColor(n.cat)}"></div>
        <div class="hoje-item-text">${esc(n.titulo||n.corpo?.substring(0,40)||'Sem título')}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // fecha hoje-card urgências
  el.innerHTML = html;
}

// ── BUSCA GLOBAL ──
function globalSearch() {
  const q = document.getElementById('global-busca').value.trim().toLowerCase();
  const el = document.getElementById('global-results');
  if (!q) { el.innerHTML=''; el.classList.add('hidden'); return; }
  el.classList.remove('hidden');

  function hl(text) {
    if (!text) return '';
    return esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`);
  }

  const results = [];
  contas.forEach(c => {
    if ((c.nome||'').toLowerCase().includes(q)) {
      results.push({ tipo:'💳 Conta', title:c.nome, sub: c.venc?fmtDate(c.venc):'Sem vencimento', onclick:`switchTab('contas')`, hl:hl(c.nome) });
    }
  });
  compromissos.forEach(c => {
    if ((c.titulo||'').toLowerCase().includes(q)||(c.desc||'').toLowerCase().includes(q)) {
      results.push({ tipo:'📅 Agenda', title:c.titulo, sub:c.data?fmtDT(c.data):'Sem data', onclick:`switchTab('compromissos')`, hl:hl(c.titulo) });
    }
  });
  notas.forEach(n => {
    if ((n.titulo||'').toLowerCase().includes(q)||(n.corpo||'').toLowerCase().includes(q)) {
      results.push({ tipo:'📝 Nota', title:n.titulo||'Sem título', sub:(n.corpo||'').substring(0,60), onclick:`editNota(${n.id})`, hl:hl(n.titulo||'Sem título') });
    }
  });

  if (!results.length) {
    el.innerHTML = `<div class="search-result-card"><div class="search-result-title" style="color:var(--text-3)">Nenhum resultado encontrado</div></div>`;
    return;
  }
  el.innerHTML = results.slice(0,8).map(r => `
    <div class="search-result-card" onclick="${r.onclick};document.getElementById('global-busca').value='';document.getElementById('global-results').classList.add('hidden')">
      <div class="search-result-type">${r.tipo}</div>
      <div class="search-result-title">${r.hl}</div>
      ${r.sub?`<div class="search-result-sub">${esc(r.sub)}</div>`:''}
    </div>`).join('');
}

// Fechar busca ao clicar fora
document.addEventListener('click', e => {
  if (!e.target.closest('.global-search') && !e.target.closest('.global-search-results')) {
    const el = document.getElementById('global-results');
    if (el) { el.innerHTML=''; el.classList.add('hidden'); }
  }
});

// ── MODO FOCO ──
let focoNotaId = null;
function openFoco(id) {
  focoNotaId = id;
  const overlay = document.getElementById('foco-overlay');
  if (id) {
    const n = notas.find(x => x.id === id);
    if (!n) return;
    document.getElementById('foco-titulo').value = n.titulo || '';
    document.getElementById('foco-corpo').value = n.corpo || '';
    closeModal('modal-nota');
  } else {
    document.getElementById('foco-titulo').value = document.getElementById('n-titulo').value || '';
    document.getElementById('foco-corpo').value = document.getElementById('n-corpo').value || '';
  }
  updateFocoCount();
  overlay.classList.remove('hidden');
  setTimeout(() => document.getElementById('foco-corpo').focus(), 100);
}

function closeFoco() {
  document.getElementById('foco-overlay').classList.add('hidden');
}

function updateFocoCount() {
  const words = document.getElementById('foco-corpo').value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('foco-count').textContent = `${words} palavra${words!==1?'s':''}`;
}

function saveFoco() {
  const titulo = document.getElementById('foco-titulo').value.trim();
  const corpo = document.getElementById('foco-corpo').value.trim();
  if (!corpo && !titulo) { closeFoco(); return; }
  if (focoNotaId) {
    const n = notas.find(x => x.id === focoNotaId);
    if (n) { n.titulo = titulo; n.corpo = corpo; save(); renderNotas(); renderHoje(); }
  } else {
    // Transfere pro form principal e salva
    document.getElementById('n-titulo').value = titulo;
    document.getElementById('n-corpo').value = corpo;
    addNota();
  }
  closeFoco();
  showToast('Nota salva ✓');
}

// ── TAGS LIVRES ──
let newNotaTags = [];
let editNotaTags = [];

function handleTagInput(e, prefix) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const input = document.getElementById(`${prefix}-tag-input`);
    const tag = input.value.trim().replace(/,/g,'');
    if (!tag) return;
    if (prefix === 'n') {
      if (!newNotaTags.includes(tag)) { newNotaTags.push(tag); renderTagsWrap('n-tags-wrap', newNotaTags, 'n'); }
    } else {
      if (!editNotaTags.includes(tag)) { editNotaTags.push(tag); renderTagsWrap('en-tags-wrap', editNotaTags, 'en'); }
    }
    input.value = '';
  }
  if (e.key === 'Backspace' && e.target.value === '') {
    if (prefix === 'n' && newNotaTags.length) { newNotaTags.pop(); renderTagsWrap('n-tags-wrap', newNotaTags, 'n'); }
    if (prefix === 'en' && editNotaTags.length) { editNotaTags.pop(); renderTagsWrap('en-tags-wrap', editNotaTags, 'en'); }
  }
}

function renderTagsWrap(wrapId, tags, prefix) {
  const wrap = document.getElementById(wrapId);
  const input = document.getElementById(`${prefix}-tag-input`);
  // remove chips antigos
  wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
  tags.forEach((tag, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${esc(tag)}<button onclick="removeTag(${i},'${prefix}')">×</button>`;
    wrap.insertBefore(chip, input);
  });
}

function removeTag(idx, prefix) {
  if (prefix === 'n') { newNotaTags.splice(idx,1); renderTagsWrap('n-tags-wrap', newNotaTags, 'n'); }
  else { editNotaTags.splice(idx,1); renderTagsWrap('en-tags-wrap', editNotaTags, 'en'); }
}

// ── INIT ──
renderContas();
renderCompromissos();
renderNotas();
renderHoje();

(function(){
  const p = document.querySelector('#cat-filter-pills .cat-pill.active');
  if(p){p.style.background=catColor('');p.style.color='#fff';p.style.borderColor='transparent';}
